<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生點名系統</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .content { padding: 30px; }
        .control-panel { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; align-items: center; padding: 20px; background: #f8f9fa; border-radius: 12px; }
        .seat-grid { display: inline-grid; gap: 10px; margin: 0 auto; padding: 20px; background: white; border-radius: 8px; }
        .seat-cell { width: 120px; height: 100px; border: 2px dashed #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; }
        .student-seat-card { width: 100%; height: 100%; border: 2px solid #667eea; border-radius: 8px; padding: 8px; cursor: move; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .seat-points { font-size: 0.8em; color: #764ba2; font-weight: bold; margin-top: 2px; }
        /* 模態框與其餘樣式皆依照原始檔案保留 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; max-width: 500px; width: 90%; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 學生點名系統</h1>
            <p>輕鬆管理學生出勤與請假記錄</p>
        </div>

        <div class="content">
            <div class="control-panel">
                <div class="control-group">
                    <label>姓名：</label>
                    <input type="text" id="studentName" placeholder="學生姓名">
                </div>
                <div class="control-group">
                    <label>座號：</label>
                    <input type="number" id="studentNumber" placeholder="座號" min="1">
                </div>
                <button onclick="addStudent()" class="btn-success">➕ 新增學生</button>
                <div class="control-group">
                    <label>日期：</label>
                    <input type="date" id="selectedDate">
                </div>
                <div class="control-group">
                    <label>行數：</label>
                    <input type="number" id="rows" value="6" min="1" max="20">
                </div>
                <div class="control-group">
                    <label>列數：</label>
                    <input type="number" id="cols" value="7" min="1" max="20">
                </div>
                <button onclick="setupSeats()">🪑 設定座位</button>
            </div>

            <div class="stats">
                <div class="stat-item"><div class="stat-value
